name: Run Lance Benchmarks

on:
  workflow_dispatch:
    inputs:
      git_sha:
        description: "Git SHA to benchmark"
        required: true
        type: string
      pr_number:
        description: "PR number (enables PR mode - local results only)"
        required: false
        type: number
      pr_repo:
        description: "PR repository (org/repo format)"
        required: false
        type: string
        default: "lance-format/lance"
      run_rust:
        description: "Run Rust benchmarks"
        required: false
        type: boolean
        default: true
      run_python:
        description: "Run Python benchmarks"
        required: false
        type: boolean
        default: true
      rust_crates:
        description: "Comma-separated list of Rust crates (empty = all)"
        required: false
        type: string
        default: ""

jobs:
  bench-io:
    if: ${{ inputs.run_rust && (inputs.rust_crates == '' || contains(inputs.rust_crates, 'lance-io')) }}
    uses: ./.github/workflows/run-rust-benchmarks.yml
    with:
      git_sha: ${{ inputs.git_sha }}
      crate_path: "rust/lance-io"
      # Need fromJson here due to https://github.com/orgs/community/discussions/67182
      pr_number: ${{ inputs.pr_number != '' && fromJson(inputs.pr_number) || '' }}
    secrets:
      LANCE_BENCH_DB_URI: ${{ secrets.LANCE_BENCH_DB_URI }}
      BENCH_S3_USER_ACCESS_KEY: ${{ secrets.BENCH_S3_USER_ACCESS_KEY }}
      BENCH_S3_USER_SECRET_KEY: ${{ secrets.BENCH_S3_USER_SECRET_KEY }}

  bench-index:
    if: false # TODO: Currently these are failing
    uses: ./.github/workflows/run-rust-benchmarks.yml
    with:
      git_sha: ${{ inputs.git_sha }}
      crate_path: "rust/lance-index"
      pr_number: ${{ inputs.pr_number != '' && fromJson(inputs.pr_number) || '' }}
    secrets:
      LANCE_BENCH_DB_URI: ${{ secrets.LANCE_BENCH_DB_URI }}
      BENCH_S3_USER_ACCESS_KEY: ${{ secrets.BENCH_S3_USER_ACCESS_KEY }}
      BENCH_S3_USER_SECRET_KEY: ${{ secrets.BENCH_S3_USER_SECRET_KEY }}

  bench-linalg:
    if: ${{ inputs.run_rust && (inputs.rust_crates == '' || contains(inputs.rust_crates, 'lance-linalg')) }}
    uses: ./.github/workflows/run-rust-benchmarks.yml
    with:
      git_sha: ${{ inputs.git_sha }}
      crate_path: "rust/lance-linalg"
      pr_number: ${{ inputs.pr_number != '' && fromJson(inputs.pr_number) || '' }}
    secrets:
      LANCE_BENCH_DB_URI: ${{ secrets.LANCE_BENCH_DB_URI }}
      BENCH_S3_USER_ACCESS_KEY: ${{ secrets.BENCH_S3_USER_ACCESS_KEY }}
      BENCH_S3_USER_SECRET_KEY: ${{ secrets.BENCH_S3_USER_SECRET_KEY }}

  bench-file:
    if: false # TODO: Currently these are failing
    uses: ./.github/workflows/run-rust-benchmarks.yml
    with:
      git_sha: ${{ inputs.git_sha }}
      crate_path: "rust/lance-file"
      pr_number: ${{ inputs.pr_number != '' && fromJson(inputs.pr_number) || '' }}
    secrets:
      LANCE_BENCH_DB_URI: ${{ secrets.LANCE_BENCH_DB_URI }}
      BENCH_S3_USER_ACCESS_KEY: ${{ secrets.BENCH_S3_USER_ACCESS_KEY }}
      BENCH_S3_USER_SECRET_KEY: ${{ secrets.BENCH_S3_USER_SECRET_KEY }}

  bench-encoding:
    if: ${{ inputs.run_rust && (inputs.rust_crates == '' || contains(inputs.rust_crates, 'lance-encoding')) }}
    uses: ./.github/workflows/run-rust-benchmarks.yml
    with:
      git_sha: ${{ inputs.git_sha }}
      crate_path: "rust/lance-encoding"
      pr_number: ${{ inputs.pr_number != '' && fromJson(inputs.pr_number) || '' }}
    secrets:
      LANCE_BENCH_DB_URI: ${{ secrets.LANCE_BENCH_DB_URI }}
      BENCH_S3_USER_ACCESS_KEY: ${{ secrets.BENCH_S3_USER_ACCESS_KEY }}
      BENCH_S3_USER_SECRET_KEY: ${{ secrets.BENCH_S3_USER_SECRET_KEY }}

  bench-python:
    if: ${{ inputs.run_python }}
    uses: ./.github/workflows/run-python-benchmarks.yml
    with:
      git_sha: ${{ inputs.git_sha }}
      pr_number: ${{ inputs.pr_number != '' && fromJson(inputs.pr_number) || '' }}
    secrets:
      LANCE_BENCH_DB_URI: ${{ secrets.LANCE_BENCH_DB_URI }}
      BENCH_S3_USER_ACCESS_KEY: ${{ secrets.BENCH_S3_USER_ACCESS_KEY }}
      BENCH_S3_USER_SECRET_KEY: ${{ secrets.BENCH_S3_USER_SECRET_KEY }}

  bench-fts-index:
    if: ${{ inputs.run_python }}
    uses: ./.github/workflows/run-fts-index-benchmark.yml
    with:
      git_sha: ${{ inputs.git_sha }}
      pr_number: ${{ inputs.pr_number != '' && fromJson(inputs.pr_number) || '' }}
    secrets:
      LANCE_BENCH_DB_URI: ${{ secrets.LANCE_BENCH_DB_URI }}
      BENCH_S3_USER_ACCESS_KEY: ${{ secrets.BENCH_S3_USER_ACCESS_KEY }}
      BENCH_S3_USER_SECRET_KEY: ${{ secrets.BENCH_S3_USER_SECRET_KEY }}

  analyze-results:
    # Runs after all benchmark jobs complete (pass or fail), but not for PR runs.
    # Investigates failures and regressions, then takes corrective action.
    if: ${{ !inputs.pr_number && !cancelled() }}
    needs: [bench-io, bench-linalg, bench-encoding, bench-python, bench-fts-index]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout lance-bench
        uses: actions/checkout@v4
        with:
          # Use PAT so the agent can push fixes back to the repo.
          token: ${{ secrets.SCHEDULER_GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Collect run context
        env:
          GH_TOKEN: ${{ secrets.SCHEDULER_GITHUB_TOKEN }}
        run: |
          {
            echo "# Benchmark Run Context"
            echo ""
            echo "**Lance commit SHA:** ${{ inputs.git_sha }}"
            echo "**Run ID:** ${{ github.run_id }}"
            echo "**Run URL:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "## Job Results"
            echo ""
            gh run view ${{ github.run_id }} --json jobs \
              --jq '.jobs[] | select(.name != "analyze-results") | "- **\(.name)**: \(.conclusion // "in_progress")"' \
              || echo "(Could not fetch job statuses)"
            echo ""
            echo "## Failed Step Logs"
            echo ""
          } > agent_context.md
          gh run view ${{ github.run_id }} --log-failed >> agent_context.md 2>/dev/null \
            || echo "(No failed steps)" >> agent_context.md

      - name: Run regression analysis
        continue-on-error: true
        env:
          LANCE_BENCH_URI: ${{ secrets.LANCE_BENCH_DB_URI }}
          AWS_ACCESS_KEY_ID: ${{ secrets.BENCH_S3_USER_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BENCH_S3_USER_SECRET_KEY }}
        run: |
          {
            echo ""
            echo "## Statistical Regression Analysis"
            echo ""
            uv run python scripts/regression_report.py \
              --output /tmp/regression_chart.html 2>&1
          } >> agent_context.md

      - name: Analyze results with Codex
        uses: openai/codex-action@v1
        env:
          GH_TOKEN: ${{ secrets.SCHEDULER_GITHUB_TOKEN }}
          LANCE_GH_TOKEN: ${{ secrets.LANCE_GITHUB_TOKEN }}
          LANCE_BENCH_URI: ${{ secrets.LANCE_BENCH_DB_URI }}
          AWS_ACCESS_KEY_ID: ${{ secrets.BENCH_S3_USER_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BENCH_S3_USER_SECRET_KEY }}
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/analyze_agent_prompt.md
          sandbox: danger-full-access

  compare-and-comment:
    # The success() || failure() is to ensure that the job runs
    # even if one or more dependent steps were skipped.  By default,
    # GHA would propagate that skip.
    if: ${{ inputs.pr_number && (success() || failure()) }}
    needs: [bench-io, bench-linalg, bench-encoding, bench-python, bench-fts-index]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lance-bench repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync
          pip install PyGithub

      - name: Download PR results
        if: inputs.pr_number
        uses: actions/download-artifact@v4
        with:
          # No name, download all artifacts
          path: ./pr-results

      - name: List PR results
        run: |
          ls -la ./pr-results

      - name: Merge PR results
        if: inputs.pr_number
        run: |
          uv run python scripts/merge_pr_results.py \
            ./pr-results \
            merged-results.lance

      - name: Compare results
        env:
          LANCE_BENCH_URI: ${{ secrets.LANCE_BENCH_DB_URI }}
          AWS_ACCESS_KEY_ID: ${{ secrets.BENCH_S3_USER_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BENCH_S3_USER_SECRET_KEY }}
        run: |
          uv run python scripts/compare_pr_benchmarks.py \
            ${{ inputs.git_sha }} \
            --pr-number ${{ inputs.pr_number }} \
            --local-results ./merged-results.lance \
            --output comparison_report.md

      - name: Print comparison report
        run: |
          cat comparison_report.md

      - name: Post comment
        env:
          GITHUB_TOKEN: ${{ secrets.PR_COMMENT_TOKEN }}
        run: |
          python scripts/post_pr_comment.py \
            ${{ inputs.pr_number }} \
            --repo ${{ inputs.pr_repo }} \
            --body-file comparison_report.md
