name: Run Python Benchmarks

on:
  workflow_call:
    inputs:
      git_sha:
        description: "Git SHA to benchmark"
        required: true
        type: string
      pr_number:
        description: "PR number (enables PR mode - local results only)"
        required: false
        type: string
    secrets:
      LANCE_BENCH_DB_URI:
        required: true
      BENCH_S3_USER_ACCESS_KEY:
        required: true
      BENCH_S3_USER_SECRET_KEY:
        required: true
  workflow_dispatch:
    inputs:
      git_sha:
        description: "Git SHA to benchmark"
        required: true
        type: string

jobs:
  benchmark:
    runs-on: warp-ubuntu-latest-x64-8x
    steps:
      - name: Checkout lance-bench repository
        uses: actions/checkout@v4

      - name: Checkout lance repository
        uses: actions/checkout@v4
        with:
          repository: lance-format/lance
          ref: ${{ inputs.git_sha }}
          path: lance

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Read Lance Rust toolchain
        id: rust_toolchain
        run: |
          CHANNEL=""
          if [ -f lance/rust-toolchain.toml ]; then
            CHANNEL=$(awk -F '"' '/^[[:space:]]*channel[[:space:]]*=/ { print $2; exit }' lance/rust-toolchain.toml)
          elif [ -f lance/rust-toolchain ]; then
            CHANNEL=$(head -n 1 lance/rust-toolchain)
          fi
          echo "channel=${CHANNEL:-stable}" >> "$GITHUB_OUTPUT"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust_toolchain.outputs.channel }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract version from Cargo.toml
        id: extract_version
        run: |
          cd lance
          VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Get commit timestamp
        id: commit_info
        run: |
          cd lance
          TIMESTAMP=$(git show -s --format=%ct ${{ inputs.git_sha }})
          SHORT_SHA=$(git rev-parse --short ${{ inputs.git_sha }})
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Create virtual environment and install dependencies
        run: |
          cd lance/python
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install maturin pytest pytest-benchmark requests duckdb datasets

      - name: Build Lance Python package
        run: |
          cd lance/python
          source venv/bin/activate
          maturin develop --release

      - name: Generate benchmark datasets
        run: |
          cd lance/python
          source venv/bin/activate
          python python/ci_benchmarks/datagen/gen_all.py

      - name: Run Python benchmarks
        run: |
          cd lance/python
          source venv/bin/activate
          pytest python/ci_benchmarks/benchmarks \
            --benchmark-json=../../pytest-output.json \
            --benchmark-only

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install lance-bench dependencies
        run: uv sync

      - name: Publish results
        env:
          LANCE_BENCH_URI: ${{ inputs.pr_number != '' && './pr-results.lance' || secrets.LANCE_BENCH_DB_URI }}
          AWS_ACCESS_KEY_ID: ${{ secrets.BENCH_S3_USER_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BENCH_S3_USER_SECRET_KEY }}
        run: |
          uv run python scripts/publish_pytest.py \
            pytest-output.json \
            --testbed-name "ubuntu-latest" \
            --dut-name "lance" \
            --dut-version "${{ steps.extract_version.outputs.version }}+${{ steps.commit_info.outputs.short_sha }}" \
            --dut-timestamp ${{ steps.commit_info.outputs.timestamp }}

      - name: Upload results
        if: inputs.pr_number != ''
        uses: actions/upload-artifact@v4
        with:
          name: pr-results-python
          path: ./pr-results.lance
